<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>找到你的第一個產品——互動引導</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Tokens ────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #110e09;
      --bg2:      #1a150e;
      --bg3:      #221c13;
      --border:   #2a2318;
      --border2:  #3a3020;
      --gold:     #c8a97a;
      --gold2:    #e8c99a;
      --text:     #f0e6d4;
      --text2:    #c8b898;
      --text3:    #8a7a6a;
      --text4:    #5a4e3e;
      --green:    #7a9e7a;
      --amber:    #9e8a7a;
      --serif:    'Noto Serif TC', Georgia, serif;
      --sans:     'Noto Sans TC', system-ui, sans-serif;
      --mono:     'DM Mono', 'Courier New', monospace;
    }

    /* Light mode override */
    body.light {
      --bg:     #faf7f2;
      --bg2:    #f0ebe2;
      --bg3:    #e8e0d4;
      --border: #d4c9b8;
      --border2:#c0b4a0;
      --text:   #1a150e;
      --text2:  #3a3020;
      --text3:  #6a5a4a;
      --text4:  #9a8a7a;
      --gold:   #a07840;
      --gold2:  #c09860;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
      line-height: 1.7;
      transition: background 0.3s, color 0.3s;
    }

    /* ── Layout ─────────────────────────────────────── */
    .wrap {
      max-width: 580px;
      margin: 0 auto;
      padding: 40px 20px 100px;
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 36px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .header-left .label {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--text4);
      font-family: var(--mono);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .header-left h1 {
      font-size: 24px;
      font-family: var(--serif);
      color: var(--text);
      line-height: 1.3;
    }
    .header-left h1 em {
      color: var(--gold);
      font-style: italic;
    }
    .theme-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text3);
      padding: 6px 12px;
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      transition: all 0.2s;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .theme-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* ── Progress ─────────────────────────────────── */
    .progress-wrap { margin-bottom: 28px; }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .progress-meta span {
      font-size: 10px;
      letter-spacing: 0.12em;
      font-family: var(--mono);
      text-transform: uppercase;
    }
    .progress-meta .label { color: var(--text3); }
    .progress-meta .count { color: var(--gold); }
    .progress-track {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
      border-radius: 2px;
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
    }
    .phase-dots {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .phase-dot {
      flex: 1;
      height: 2px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.4s;
    }
    .phase-dot.active   { background: var(--gold); }
    .phase-dot.done     { background: var(--gold2); }

    /* ── Phase Tag ───────────────────────────────── */
    .phase-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 2px;
      font-size: 10px;
      letter-spacing: 0.14em;
      font-family: var(--mono);
      text-transform: uppercase;
      margin-bottom: 16px;
      border: 1px solid;
    }
    .phase-tag.p1 { color: var(--green);  border-color: var(--green); }
    .phase-tag.p2 { color: var(--amber);  border-color: var(--amber); }
    .phase-tag.p3 { color: var(--gold);   border-color: var(--gold);  }

    /* ── Question ────────────────────────────────── */
    .question-block { animation: fadeUp 0.45s ease forwards; }

    .question-text {
      font-size: 16px;
      color: var(--text);
      line-height: 1.85;
      margin-bottom: 18px;
      white-space: pre-wrap;
      font-weight: 300;
    }
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--gold);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    .hint-box {
      padding: 10px 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: 12px;
      color: var(--text3);
      font-family: var(--mono);
      line-height: 1.6;
      margin-bottom: 18px;
    }

    /* ── Choices ──────────────────────────────── */
    .choices { display: grid; gap: 8px; margin-bottom: 18px; }
    .choice-btn {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text3);
      font-size: 13px;
      font-family: var(--sans);
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }
    .choice-btn:hover { border-color: var(--gold); color: var(--gold2); }
    .choice-btn.selected { border-color: var(--gold); color: var(--gold); background: rgba(200,169,122,0.08); }
    .choice-key {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text4);
      flex-shrink: 0;
      padding-top: 2px;
    }
    .choice-btn.selected .choice-key { color: var(--gold); }

    /* ── Textarea ──────────────────────────────── */
    textarea {
      width: 100%;
      padding: 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-size: 14px;
      font-family: var(--sans);
      font-weight: 300;
      line-height: 1.7;
      resize: vertical;
      min-height: 90px;
      margin-bottom: 14px;
      transition: border-color 0.2s;
      outline: none;
    }
    textarea:focus { border-color: var(--gold); }
    textarea::placeholder { color: var(--text4); }

    /* ── Buttons ───────────────────────────────── */
    .btn-row { display: flex; align-items: center; gap: 14px; }
    .btn-primary {
      padding: 11px 24px;
      background: var(--gold);
      border: none;
      border-radius: 2px;
      color: var(--bg);
      font-size: 12px;
      letter-spacing: 0.12em;
      font-family: var(--mono);
      text-transform: uppercase;
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.2s, background 0.2s;
    }
    .btn-primary:disabled { opacity: 0.35; cursor: default; }
    .btn-primary:not(:disabled):hover { background: var(--gold2); }
    .btn-hint {
      font-size: 10px;
      color: var(--text4);
      font-family: var(--mono);
    }

    /* ── Affirmation ───────────────────────────── */
    .affirmation {
      margin-top: 18px;
      font-size: 14px;
      color: var(--gold);
      font-family: var(--serif);
      font-style: italic;
      animation: fadeUp 0.4s ease;
    }

    /* ── History ───────────────────────────────── */
    .history { margin-bottom: 28px; }
    .history-item {
      margin-bottom: 14px;
      animation: slideIn 0.35s ease;
    }
    .history-num {
      font-size: 10px;
      color: var(--text4);
      font-family: var(--mono);
      margin-bottom: 4px;
    }
    .history-ans {
      font-size: 13px;
      color: var(--text3);
      line-height: 1.65;
      padding-left: 12px;
      border-left: 1px solid var(--border);
    }

    /* ── Summary Card ──────────────────────────── */
    .summary { animation: fadeUp 0.6s ease forwards; }
    .summary-header {
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .summary-label {
      font-size: 10px;
      letter-spacing: 0.16em;
      color: var(--gold);
      font-family: var(--mono);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .summary-title {
      font-size: 22px;
      font-family: var(--serif);
      color: var(--text);
    }

    .summary-grid { display: grid; gap: 12px; margin-bottom: 24px; }
    .summary-field {
      padding: 14px 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    .field-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--text3);
      font-family: var(--mono);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .field-value {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.65;
    }

    .action-box {
      padding: 18px 20px;
      background: var(--bg2);
      border: 1px solid rgba(200,169,122,0.3);
      border-radius: 4px;
      margin-bottom: 20px;
    }
    .action-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--gold);
      font-family: var(--mono);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .action-text {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.75;
    }
    .action-text em { color: var(--text); font-style: italic; }

    .btn-secondary {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      border-radius: 3px;
      font-size: 12px;
      letter-spacing: 0.12em;
      font-family: var(--mono);
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 10px;
    }
    .btn-secondary:hover { background: rgba(200,169,122,0.1); }

    .btn-restart {
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text3);
      border-radius: 3px;
      font-size: 11px;
      letter-spacing: 0.1em;
      font-family: var(--mono);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-restart:hover { border-color: var(--text3); color: var(--text2); }

    /* ── Animations ──────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-6px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Print / PDF ─────────────────────────── */
    @media print {
      body { background: #fff !important; color: #111 !important; }
      .theme-btn, .btn-secondary, .btn-restart, .btn-primary,
      .progress-wrap, .header, textarea, .choices,
      .btn-row, .affirmation, .hint-box { display: none !important; }
      .wrap { padding: 0; max-width: 100%; }
      .summary-field, .action-box { border: 1px solid #ccc !important; background: #fafafa !important; }
      .field-value, .action-text, .summary-title { color: #111 !important; }
      .field-label, .action-label, .summary-label { color: #555 !important; }
      .summary { display: block !important; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="label">知識創業教練</div>
      <h1>找到你的<br><em>第一個產品</em></h1>
    </div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀ 淺色</button>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-meta">
      <span class="label">進度</span>
      <span class="count" id="progressCount">1 / 10</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:10%"></div>
    </div>
    <div class="phase-dots" id="phaseDots">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- Main area -->
  <div id="app"></div>

</div>

<script>
/* ═══════════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════════ */
const QUESTIONS = [
  {
    id: 1, phase: "挖掘素材", phaseClass: "p1",
    text: "先不要想賣什麼。告訴我——過去這一年，你花最多時間鑽研的事情是什麼？不管是工作上、生活上、還是單純的興趣都算。",
    affirmations: ["很有意思。這個方向值得繼續挖。", "好，繼續。"],
  },
  {
    id: 2, phase: "挖掘素材", phaseClass: "p1",
    text: "在這件事上，你有沒有走過一段彎路，後來才找到更快、更有效的方法？如果有，那個轉折點是什麼？",
    affirmations: ["那段彎路，就是你最值錢的資產。", "轉折點往往就是產品的核心。"],
  },
  {
    id: 3, phase: "挖掘素材", phaseClass: "p1",
    text: "你身邊有沒有人因為你分享這件事而受益過？不管是一句話的建議，還是你幫他解決了某個問題。是什麼情況？",
    affirmations: ["你已經在免費提供諮詢了。", "這就是你市場存在的最好證明。"],
  },
  {
    id: 4, phase: "挖掘素材", phaseClass: "p1",
    text: "你有沒有買過跟這個主題相關的課程、電子書、或任何付費內容？你買的時候在解決什麼問題？",
    affirmations: ["你買的時候，就是你的目標客戶。", "消費過，代表你理解這個市場的痛點。"],
  },
  {
    id: 5, phase: "收斂方向", phaseClass: "p2",
    text: "根據你說的，我看到幾個可能的方向。\n\n方向 A：幫助【某類人】在【某情境】做到【某件事】\n方向 B：幫助【某類人】解決【某個痛點】\n方向 C：幫助【某類人】從【某狀態】達到【某目標】\n\n哪個方向讓你感覺「這個我真的可以幫到人」？",
    affirmations: ["選擇直覺反應最強的那個。", "你的直覺比你想的更準。"],
  },
  {
    id: 6, phase: "收斂方向", phaseClass: "p2",
    text: "你知道現在市場上有沒有人在賣類似的東西嗎？你看過哪些競品？",
    hint: "↗ 如果不確定，現在就去 Google / YouTube 搜尋【你的主題 + 課程/教學】，告訴我你找到什麼。",
    affirmations: ["有競品是好事，代表市場已被驗證。", "競品是你最好的市場研究報告。"],
  },
  {
    id: 7, phase: "收斂方向", phaseClass: "p2",
    text: "如果你明天就要把這個產品賣給一個人，你能不能在一次一小時的通話裡，幫他解決這個問題？",
    affirmations: ["能，就夠了。這是你的起點，不是終點。", "一小時的諮詢，就是你最小可行產品。"],
  },
  {
    id: 8, phase: "定義產品", phaseClass: "p3",
    text: "你覺得這個產品最適合用哪種形式交付？\n\n先不要想哪個最容易做，想哪個對客戶最有價值。",
    isChoice: true,
    choices: [
      { key: "A", desc: "PDF 或電子書（步驟清單 / 框架）" },
      { key: "B", desc: "短課程（3–5 個影片模組）" },
      { key: "C", desc: "模板（讓客戶直接套用）" },
      { key: "D", desc: "四次一對一諮詢通話" },
    ],
    affirmations: ["形式決定了客戶的體驗與你的定價空間。", "記住，形式可以之後迭代，先把核心內容做出來。"],
  },
  {
    id: 9, phase: "定義產品", phaseClass: "p3",
    text: "如果你要用一句話描述這個產品能幫客戶達成的結果，你會怎麼說？\n\n格式：幫助【誰】在【時間範圍】內做到【具體結果】。",
    affirmations: ["這句話就是你的核心價值主張。", "把這句話存起來——它會出現在你的銷售頁上。"],
  },
  {
    id: 10, phase: "定義產品", phaseClass: "p3",
    text: "最後一個問題：你現在腦中有沒有 1–3 個人，是你認識的、馬上就可以聯絡、而且這個產品對他們有價值的？他們是誰？",
    affirmations: ["這些人，就是你的第一批客戶。", "不需要找陌生人，先從認識你的人開始。"],
    isLast: true,
  },
];

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let state = {
  step: 0,
  answers: [],
  typingDone: false,
  showAff: false,
  affText: "",
  selectedChoice: null,
  done: false,
};

/* ═══════════════════════════════════════════════════
   THEME
═══════════════════════════════════════════════════ */
function toggleTheme() {
  document.body.classList.toggle("light");
  const btn = document.getElementById("themeBtn");
  btn.textContent = document.body.classList.contains("light") ? "🌙 深色" : "☀ 淺色";
}

/* ═══════════════════════════════════════════════════
   PROGRESS
═══════════════════════════════════════════════════ */
function updateProgress() {
  if (state.done) {
    document.getElementById("progressWrap").style.display = "none";
    return;
  }
  const total = QUESTIONS.length;
  const cur   = state.step + 1;
  const pct   = Math.round((cur / total) * 100);

  document.getElementById("progressCount").textContent = cur + " / " + total;
  document.getElementById("progressFill").style.width  = pct + "%";

  // Phase dots (3 phases: 1-4, 5-7, 8-10)
  const phases = [
    { label: "挖掘素材", range: [1,4] },
    { label: "收斂方向", range: [5,7] },
    { label: "定義產品", range: [8,10] },
  ];
  const dotsEl = document.getElementById("phaseDots");
  dotsEl.innerHTML = phases.map((p, i) => {
    const start = p.range[0], end = p.range[1];
    let cls = "";
    if (cur > end)               cls = "done";
    else if (cur >= start)       cls = "active";
    return `<div class="phase-dot ${cls}" title="${p.label}"></div>`;
  }).join("");
}

/* ═══════════════════════════════════════════════════
   TYPING EFFECT
═══════════════════════════════════════════════════ */
let typingTimer = null;
function typeText(text, el, onDone, speed = 20) {
  clearInterval(typingTimer);
  let i = 0;
  el.textContent = "";
  typingTimer = setInterval(() => {
    if (i < text.length) {
      el.textContent = text.slice(0, i + 1);
      i++;
    } else {
      clearInterval(typingTimer);
      // Remove cursor blink from question, mark done
      state.typingDone = true;
      renderInputArea();
      if (onDone) onDone();
    }
  }, speed);
}

/* ═══════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════ */
function render() {
  updateProgress();
  const app = document.getElementById("app");

  if (state.done) {
    app.innerHTML = buildSummary();
    return;
  }

  const q = QUESTIONS[state.step];

  let historyHTML = "";
  state.answers.forEach((ans, i) => {
    historyHTML += `
      <div class="history-item">
        <div class="history-num">Q${i + 1} · ${QUESTIONS[i].phase}</div>
        <div class="history-ans">${escHtml(ans)}</div>
      </div>`;
  });

  app.innerHTML = `
    <div class="history" id="history">${historyHTML}</div>
    <div class="question-block" id="qBlock">
      <span class="phase-tag ${q.phaseClass}">${q.phase}</span>
      <div class="question-text" id="qText"></div>
      ${q.hint ? `<div class="hint-box" id="qHint" style="display:none">${escHtml(q.hint)}</div>` : ""}
      <div id="inputArea" style="display:none"></div>
      <div class="affirmation" id="affirmation" style="display:none"></div>
    </div>
  `;

  // Start typing
  const qTextEl = document.getElementById("qText");
  typeText(q.text, qTextEl, () => {
    if (q.hint) document.getElementById("qHint").style.display = "block";
    renderInputArea();
    scrollBottom();
  });
}

function renderInputArea() {
  if (!state.typingDone) return;
  const q = QUESTIONS[state.step];
  const ia = document.getElementById("inputArea");
  if (!ia) return;
  ia.style.display = "block";

  if (q.isChoice) {
    ia.innerHTML = `
      <div class="choices">
        ${q.choices.map(c => `
          <button class="choice-btn${state.selectedChoice === c.key ? " selected" : ""}"
                  onclick="selectChoice('${c.key}')">
            <span class="choice-key">${c.key}</span>
            <span>${escHtml(c.desc)}</span>
          </button>`).join("")}
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="submitBtn"
          onclick="submitAnswer()"
          ${!state.selectedChoice ? "disabled" : ""}>
          ${q.isLast ? "完成" : "繼續 →"}
        </button>
      </div>`;
  } else {
    ia.innerHTML = `
      <textarea id="ansInput" placeholder="輸入你的回答..."
        onkeydown="handleKey(event)"></textarea>
      <div class="btn-row">
        <button class="btn-primary" id="submitBtn" onclick="submitAnswer()">
          ${q.isLast ? "完成" : "繼續 →"}
        </button>
        <span class="btn-hint">⌘↵ 快速送出</span>
      </div>`;
    const ta = document.getElementById("ansInput");
    if (ta) ta.focus();
  }
}

/* ═══════════════════════════════════════════════════
   INTERACTIONS
═══════════════════════════════════════════════════ */
function selectChoice(key) {
  state.selectedChoice = key;
  renderInputArea();
}

function handleKey(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
    e.preventDefault();
    submitAnswer();
  }
}

function submitAnswer() {
  if (state.showAff) return;
  const q = QUESTIONS[state.step];

  let val = "";
  if (q.isChoice) {
    if (!state.selectedChoice) return;
    const chosen = q.choices.find(c => c.key === state.selectedChoice);
    val = chosen.key + "）" + chosen.desc;
  } else {
    const ta = document.getElementById("ansInput");
    val = ta ? ta.value.trim() : "";
    if (!val) return;
  }

  // Show affirmation
  state.showAff = true;
  const aff = q.affirmations[Math.floor(Math.random() * q.affirmations.length)];
  const affEl = document.getElementById("affirmation");
  if (affEl) { affEl.textContent = "✦ " + aff; affEl.style.display = "block"; }

  const btn = document.getElementById("submitBtn");
  if (btn) btn.disabled = true;

  state.answers.push(val);

  setTimeout(() => {
    state.showAff      = false;
    state.typingDone   = false;
    state.selectedChoice = null;

    if (state.step + 1 >= QUESTIONS.length) {
      state.done = true;
    } else {
      state.step++;
    }
    render();
    scrollBottom();
  }, 1500);
}

/* ═══════════════════════════════════════════════════
   SUMMARY
═══════════════════════════════════════════════════ */
function buildSummary() {
  const q9  = state.answers[8] || "（未填入）";
  const q8  = state.answers[7] || "（未填入）";
  const q10 = state.answers[9] || "（未填入）";
  const q1  = state.answers[0] || "（未填入）";

  return `
    <div class="summary" id="summary">
      <div class="summary-header">
        <div class="summary-label">✦ 你的第一個產品草稿</div>
        <div class="summary-title">準備好了。<br>現在開始賣。</div>
      </div>

      <div class="summary-grid">
        <div class="summary-field">
          <div class="field-label">核心主題</div>
          <div class="field-value">${escHtml(q1)}</div>
        </div>
        <div class="summary-field">
          <div class="field-label">承諾的結果</div>
          <div class="field-value">${escHtml(q9)}</div>
        </div>
        <div class="summary-field">
          <div class="field-label">產品形式</div>
          <div class="field-value">${escHtml(q8)}</div>
        </div>
        <div class="summary-field">
          <div class="field-label">第一批潛在客戶</div>
          <div class="field-value">${escHtml(q10)}</div>
        </div>
        <div class="summary-field">
          <div class="field-label">定價建議</div>
          <div class="field-value">低價測試版：NT$1,500–3,000 ／ 一對一諮詢：NT$5,000–12,000</div>
        </div>
      </div>

      <div class="action-box">
        <div class="action-label">▶ 你的第一步（現在就做）</div>
        <div class="action-text">
          傳訊息給你剛才提到的那個人，問他：<br>
          <em>「我最近在整理一個方法，你有沒有在面對這個問題？我想聊聊看能不能幫到你。」</em>
        </div>
      </div>

      <button class="btn-secondary" onclick="exportPDF()">
        ↓ 匯出為 PDF
      </button>
      <button class="btn-restart" onclick="restart()">
        ↺ 重新開始
      </button>
    </div>`;
}

function exportPDF() {
  window.print();
}

function restart() {
  state = { step: 0, answers: [], typingDone: false, showAff: false, affText: "", selectedChoice: null, done: false };
  document.getElementById("progressWrap").style.display = "block";
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* ═══════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════ */
function escHtml(str) {
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/\n/g, "<br>");
}

function scrollBottom() {
  setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" }), 80);
}

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>找到你的第一個產品</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+TC:wght@200;300;400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --w:     #ffffff;
  --g0:    #fafafa;
  --g1:    #f4f4f2;
  --g2:    #e8e6e2;
  --g3:    #d0cdc8;
  --g4:    #a8a49e;
  --g5:    #706c66;
  --g6:    #3a3732;
  --ink:   #1c1a18;
  --gold:  #b8935a;
  --gold2: #d4b07a;
  --serif: 'Cormorant', Georgia, serif;
  --sans:  'Noto Sans TC', system-ui, sans-serif;
  --mono:  'DM Mono', monospace;
}

html { font-size: 16px; scroll-behavior: smooth; }

body {
  background: var(--w);
  color: var(--ink);
  font-family: var(--sans);
  font-weight: 300;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Shell ─────────────────────────────── */
.shell {
  max-width: 600px;
  margin: 0 auto;
  padding: 0 32px 120px;
  min-height: 100vh;
}

/* ── Nav ──────────────────────────────── */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 28px 0;
  border-bottom: 1px solid var(--g2);
}
.nav-logo {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--g4);
}
.nav-logo b { color: var(--gold); font-weight: 400; }
.theme-sw {
  width: 36px; height: 20px;
  background: var(--g2);
  border: none; border-radius: 10px;
  cursor: pointer; position: relative;
  transition: background .3s;
  flex-shrink: 0;
}
.theme-sw::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--w);
  transition: transform .3s, background .3s;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
body.dark .theme-sw { background: var(--gold); }
body.dark .theme-sw::after { transform: translateX(16px); }

/* ── Dark mode ────────────────────────── */
body.dark {
  background: #111008;
  color: #e8e0d4;
  --w:    #111008;
  --g0:   #161310;
  --g1:   #1e1b16;
  --g2:   #2a261f;
  --g3:   #3e3930;
  --g4:   #7a7268;
  --g5:   #a09890;
  --g6:   #c8c0b4;
  --ink:  #ede5d8;
  --gold: #c9a96e;
  --gold2:#e0c898;
}

/* ── Hero ─────────────────────────────── */
.hero {
  padding: 72px 0 60px;
}
.hero-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .28em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 24px;
}
.hero-title {
  font-family: var(--serif);
  font-size: clamp(52px, 10vw, 80px);
  font-weight: 300;
  line-height: 1.0;
  letter-spacing: -.02em;
  color: var(--ink);
  margin-bottom: 20px;
}
.hero-title em { font-style: italic; color: var(--gold); }
.hero-desc {
  font-size: 13px;
  color: var(--g4);
  letter-spacing: .06em;
  line-height: 1.8;
}
.hero-line {
  width: 40px;
  height: 1px;
  background: var(--gold2);
  margin: 28px 0;
}

/* ── Progress ─────────────────────────── */
.progress {
  margin-bottom: 56px;
}
.progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
}
.progress-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--g3);
}
.progress-frac {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--gold);
}
.progress-bar {
  height: 1px;
  background: var(--g2);
  position: relative;
  overflow: visible;
}
.progress-done {
  position: absolute;
  left: 0; top: 0;
  height: 1px;
  background: var(--gold);
  transition: width .8s cubic-bezier(.4,0,.2,1);
}
.progress-dot {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 8px var(--gold2);
  transition: left .8s cubic-bezier(.4,0,.2,1);
}
.phases {
  display: flex;
  gap: 4px;
  margin-top: 12px;
}
.phase-chip {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--g3);
  padding: 3px 10px;
  border: 1px solid var(--g2);
  border-radius: 20px;
  transition: all .35s;
}
.phase-chip.on  { color: var(--gold); border-color: var(--gold2); background: color-mix(in srgb, var(--gold) 6%, transparent); }
.phase-chip.was { color: var(--g4); border-color: var(--g2); background: var(--g1); }

/* ── History ──────────────────────────── */
.history { margin-bottom: 48px; }
.h-row {
  display: flex;
  gap: 20px;
  padding: 14px 0;
  border-bottom: 1px solid var(--g1);
  animation: up .3s ease;
}
.h-n {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--g3);
  letter-spacing: .1em;
  padding-top: 3px;
  flex-shrink: 0;
  width: 24px;
  text-align: right;
}
.h-a {
  font-size: 13px;
  color: var(--g5);
  line-height: 1.75;
  flex: 1;
}

/* ── Question block ───────────────────── */
.q-block { animation: up .5s ease; }

.q-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--g2);
}
.q-phase-tag {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--gold);
  display: flex;
  align-items: center;
  gap: 8px;
}
.q-phase-tag::before {
  content: '';
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--gold);
}
.q-ordinal {
  font-family: var(--serif);
  font-size: 13px;
  font-style: italic;
  color: var(--g3);
  letter-spacing: .05em;
}

.q-text {
  font-family: var(--serif);
  font-size: clamp(22px, 4vw, 28px);
  font-weight: 300;
  line-height: 1.65;
  color: var(--ink);
  margin-bottom: 36px;
  letter-spacing: -.005em;
  white-space: pre-wrap;
}
.q-cursor {
  display: inline-block;
  width: 2px; height: .9em;
  background: var(--gold);
  vertical-align: middle;
  margin-left: 3px;
  animation: blink 1s step-end infinite;
}

.q-hint {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--g4);
  letter-spacing: .06em;
  line-height: 1.7;
  margin-bottom: 28px;
  padding-left: 14px;
  border-left: 1px solid var(--gold2);
}

/* ── Choices ──────────────────────────── */
.choices { display: grid; gap: 2px; margin-bottom: 36px; }
.choice-item {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 16px 0;
  border-bottom: 1px solid var(--g1);
  cursor: pointer;
  transition: all .2s;
  position: relative;
}
.choice-item:first-child { border-top: 1px solid var(--g1); }
.choice-item::after {
  content: '';
  position: absolute;
  left: -32px; right: -32px; top: 0; bottom: 0;
  background: color-mix(in srgb, var(--gold) 4%, transparent);
  opacity: 0;
  transition: opacity .2s;
}
.choice-item:hover::after { opacity: 1; }
.choice-item.sel::after   { opacity: 1; }
.choice-key {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--g3);
  width: 18px;
  flex-shrink: 0;
  transition: color .2s;
  position: relative; z-index: 1;
}
.choice-item.sel .choice-key { color: var(--gold); }
.choice-txt {
  font-size: 14px;
  color: var(--g6);
  line-height: 1.6;
  transition: color .2s;
  position: relative; z-index: 1;
}
.choice-item.sel .choice-txt { color: var(--ink); }
.choice-check {
  margin-left: auto;
  width: 16px; height: 16px;
  border: 1px solid var(--g2);
  border-radius: 50%;
  flex-shrink: 0;
  position: relative; z-index: 1;
  transition: all .2s;
  display: flex; align-items: center; justify-content: center;
}
.choice-item.sel .choice-check {
  border-color: var(--gold);
  background: var(--gold);
}
.choice-item.sel .choice-check::after {
  content: '';
  width: 4px; height: 4px;
  border-radius: 50%;
  background: white;
}

/* ── Textarea ─────────────────────────── */
.field {
  margin-bottom: 36px;
  position: relative;
}
.field-line {
  width: 100%;
  height: 1px;
  background: var(--g2);
  transition: background .3s;
}
.field.focused .field-line { background: var(--gold); }
textarea {
  width: 100%;
  background: transparent;
  border: none;
  border-top: 1px solid var(--g2);
  outline: none;
  padding: 18px 0 12px;
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 300;
  color: var(--ink);
  line-height: 1.85;
  resize: none;
  min-height: 120px;
  letter-spacing: .01em;
  display: block;
  transition: border-color .3s;
}
textarea:focus { border-top-color: var(--gold); }
textarea::placeholder { color: var(--g3); }
.char-count {
  text-align: right;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--g3);
  letter-spacing: .1em;
  margin-top: 6px;
  transition: color .2s;
}
.char-count.has { color: var(--g4); }

/* ── Submit ───────────────────────────── */
.submit-row {
  display: flex;
  align-items: center;
  gap: 20px;
}
.btn-next {
  background: transparent;
  border: 1px solid var(--ink);
  color: var(--ink);
  padding: 13px 36px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .22em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .25s;
  position: relative;
  overflow: hidden;
}
.btn-next::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--ink);
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.btn-next:hover::before  { transform: translateY(0); }
.btn-next:hover          { color: var(--w); }
.btn-next[disabled]      { opacity: .25; cursor: default; pointer-events: none; }
.btn-next span           { position: relative; z-index: 1; }
.kb-hint {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--g3);
  letter-spacing: .1em;
}

/* ── Affirmation ──────────────────────── */
.aff-line {
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid var(--g1);
  animation: up .4s ease;
  display: flex;
  align-items: flex-start;
  gap: 16px;
}
.aff-mark {
  font-family: var(--serif);
  font-size: 40px;
  color: var(--gold2);
  line-height: 1;
  flex-shrink: 0;
  opacity: .6;
}
.aff-txt {
  font-family: var(--serif);
  font-size: 18px;
  font-style: italic;
  font-weight: 300;
  color: var(--gold);
  line-height: 1.6;
  padding-top: 6px;
}

/* ── Summary ──────────────────────────── */
.summary { animation: up .6s ease; }

.sum-top {
  padding: 72px 0 56px;
  border-bottom: 1px solid var(--g2);
  margin-bottom: 56px;
}
.sum-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .26em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 20px;
}
.sum-title {
  font-family: var(--serif);
  font-size: clamp(42px, 8vw, 64px);
  font-weight: 300;
  line-height: 1.05;
  letter-spacing: -.02em;
  color: var(--ink);
}
.sum-title em { font-style: italic; color: var(--gold); }

.sum-items { margin-bottom: 56px; }
.sum-row {
  display: grid;
  grid-template-columns: 160px 1fr;
  gap: 0 32px;
  padding: 22px 0;
  border-bottom: 1px solid var(--g1);
  align-items: baseline;
}
.sum-row:first-child { border-top: 1px solid var(--g1); }
.sum-lbl {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--g4);
  padding-top: 3px;
}
.sum-val {
  font-size: 15px;
  color: var(--ink);
  line-height: 1.75;
  font-weight: 300;
}

.cta-block {
  padding: 36px 0;
  border-top: 1px solid var(--g2);
  border-bottom: 1px solid var(--g2);
  margin-bottom: 48px;
}
.cta-step {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 16px;
}
.cta-body {
  font-size: 14px;
  color: var(--g5);
  line-height: 1.9;
}
.cta-quote {
  font-family: var(--serif);
  font-size: 18px;
  font-style: italic;
  color: var(--ink);
  line-height: 1.7;
  margin-top: 14px;
  padding-left: 16px;
  border-left: 2px solid var(--gold2);
}

.sum-actions { display: flex; flex-direction: column; gap: 10px; }
.btn-pdf {
  padding: 15px;
  background: var(--ink);
  color: var(--w);
  border: none;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .22em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .25s;
  text-align: center;
}
body.dark .btn-pdf { background: var(--g6); color: var(--ink); }
.btn-pdf:hover { background: var(--gold); color: var(--w); }
.btn-restart {
  padding: 13px;
  background: transparent;
  border: 1px solid var(--g2);
  color: var(--g4);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .18em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .2s;
  text-align: center;
}
.btn-restart:hover { border-color: var(--g4); color: var(--g6); }

/* ── Footer ───────────────────────────── */
footer {
  padding: 28px 0;
  border-top: 1px solid var(--g1);
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 48px;
}
footer span {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--g3);
}

/* ── Animations ───────────────────────── */
@keyframes up   { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes blink{ 0%,100%{opacity:1} 50%{opacity:0} }

/* ── Responsive ───────────────────────── */
@media(max-width:600px){
  .shell{padding:0 20px 80px}
  .sum-row{grid-template-columns:1fr;gap:6px}
  .sum-lbl{padding-bottom:2px}
  .choice-item::after{left:-20px;right:-20px}
}

/* ── Print ────────────────────────────── */
@media print{
  nav,.progress,.history,.q-block,.sum-actions,footer{display:none!important}
  body{background:#fff!important;color:#111!important}
  .sum-top{padding:32px 0}
  .sum-row{border-color:#ddd!important}
  .sum-val{color:#222!important}
  .sum-lbl{color:#888!important}
  .cta-block{border-color:#ddd!important}
  .cta-body,.cta-quote{color:#333!important}
}
</style>
</head>
<body>
<div class="shell">

  <nav>
    <div class="nav-logo">知識創業教練 <b>/</b> 產品發現</div>
    <button class="theme-sw" id="sw" onclick="toggleDark()" title="切換深色模式"></button>
  </nav>

  <!-- Hero -->
  <div class="hero" id="hero">
    <div class="hero-eyebrow">互動引導工作坊</div>
    <div class="hero-title">找到你的<br><em>第一個產品</em></div>
    <div class="hero-line"></div>
    <div class="hero-desc">十個問題&ensp;·&ensp;三個階段&ensp;·&ensp;一份可以立刻執行的草稿</div>
  </div>

  <!-- Progress -->
  <div class="progress" id="prog">
    <div class="progress-meta">
      <span class="progress-label">進度</span>
      <span class="progress-frac" id="pfrac">1 / 10</span>
    </div>
    <div class="progress-bar">
      <div class="progress-done" id="pdone" style="width:10%"></div>
      <div class="progress-dot"  id="pdot"  style="left:10%"></div>
    </div>
    <div class="phases" id="phases"></div>
  </div>

  <!-- Main -->
  <div id="app"></div>

  <footer>
    <span>定位不是想出來的，是賣出來的</span>
    <span id="fq"></span>
  </footer>

</div>
<script>
/* ═══ DATA ═══════════════════════════════════════ */
const QS=[
  {id:1,ph:"挖掘素材",p:1,
   t:"先不要想賣什麼。\n\n告訴我——過去這一年，你花最多時間鑽研的事情是什麼？不管是工作上、生活上、還是單純的興趣都算。",
   af:["很有意思。這個方向值得繼續挖。","好，繼續。這是你最真實的材料。"]},
  {id:2,ph:"挖掘素材",p:1,
   t:"在這件事上，你有沒有走過一段彎路，後來才找到更快、更有效的方法？\n\n如果有，那個轉折點是什麼？",
   af:["那段彎路，就是你最值錢的資產。","轉折點往往就是產品的核心。"]},
  {id:3,ph:"挖掘素材",p:1,
   t:"你身邊有沒有人因為你分享這件事而受益過？\n\n不管是一句話的建議，還是你幫他解決了某個問題。是什麼情況？",
   af:["你已經在免費提供諮詢了。","這就是你市場存在的最好證明。"]},
  {id:4,ph:"挖掘素材",p:1,
   t:"你有沒有買過跟這個主題相關的課程、電子書、或任何付費內容？\n\n你買的時候在解決什麼問題？",
   af:["你買的時候，就是你的目標客戶。","消費過，代表你真正理解這個市場的痛。"]},
  {id:5,ph:"收斂方向",p:2,
   t:"根據你說的，我看到幾個可能的方向。\n\n方向 A：幫助【某類人】在【某情境】做到【某件事】\n方向 B：幫助【某類人】解決【某個核心痛點】\n方向 C：幫助【某類人】從【某狀態】加速到【某目標】\n\n哪個方向讓你感覺「這個我真的可以幫到人」？",
   af:["選擇直覺反應最強的那個。","你的直覺比分析更準。"]},
  {id:6,ph:"收斂方向",p:2,
   t:"你知道現在市場上有沒有人在賣類似的東西嗎？\n\n你看過哪些競品？",
   hint:"如果不確定，現在去 Google 或 YouTube 搜尋「你的主題 + 課程」，告訴我你找到什麼。",
   af:["有競品是好事，代表市場已被驗證。","競品是你最省錢的市場研究報告。"]},
  {id:7,ph:"收斂方向",p:2,
   t:"如果你明天就要把這個產品賣給一個人——\n\n你能不能在一次一小時的通話裡，幫他解決這個問題？",
   af:["能，就夠了。這是你的起點，不是終點。","一小時的諮詢，就是你的最小可行產品。"]},
  {id:8,ph:"定義產品",p:3,
   t:"你覺得這個產品最適合用哪種形式交付？\n\n先不要想哪個最容易做，想哪個對客戶最有價值。",
   isC:true,
   cs:[
     {k:"A",d:"PDF 或電子書（步驟清單 / 框架）"},
     {k:"B",d:"短課程（3–5 個影片模組）"},
     {k:"C",d:"模板（讓客戶直接套用）"},
     {k:"D",d:"四次一對一諮詢通話"},
   ],
   af:["形式決定了客戶的體驗與你的定價空間。","形式可以迭代，先把核心內容做出來。"]},
  {id:9,ph:"定義產品",p:3,
   t:"用一句話描述這個產品能幫客戶達成的結果——\n\n格式：幫助【誰】在【時間範圍】內做到【具體結果】。",
   af:["這句話就是你的核心價值主張。","把它存起來，它會出現在你的銷售頁上。"]},
  {id:10,ph:"定義產品",p:3,
   t:"最後一個問題：你現在腦中有沒有 1–3 個人——\n\n是你認識的、馬上就可以聯絡、而且這個產品對他們有價值的？他們是誰？",
   af:["這些人，就是你的第一批客戶。","不需要找陌生人，先從認識你的人開始。"],
   last:true},
];

/* ═══ STATE ══════════════════════════════════════ */
let S={step:0,ans:[],typed:false,busy:false,sel:null,done:false};

/* ═══ DARK ═══════════════════════════════════════ */
function toggleDark(){document.body.classList.toggle('dark');}

/* ═══ PROGRESS ═══════════════════════════════════ */
function refreshProg(){
  if(S.done){
    document.getElementById('prog').style.display='none';
    document.getElementById('hero').style.display='none';
    document.getElementById('fq').textContent='';
    return;
  }
  const n=S.step+1,tot=QS.length,pct=Math.round(n/tot*100);
  document.getElementById('pfrac').textContent=n+' / '+tot;
  document.getElementById('pdone').style.width=pct+'%';
  document.getElementById('pdot').style.left=pct+'%';
  document.getElementById('fq').textContent='問題 '+n;
  const PH=[{l:'挖掘素材',r:[1,4]},{l:'收斂方向',r:[5,7]},{l:'定義產品',r:[8,10]}];
  document.getElementById('phases').innerHTML=PH.map(p=>{
    let c='';
    if(n>p.r[1])c='was';
    else if(n>=p.r[0])c='on';
    return`<span class="phase-chip ${c}">${p.l}</span>`;
  }).join('');
}

/* ═══ TYPING ══════════════════════════════════════ */
let TT=null;
function type(text,el,cb,spd=16){
  clearInterval(TT);let i=0;el.textContent='';
  TT=setInterval(()=>{
    if(i<text.length){el.textContent=text.slice(0,i+1);i++;}
    else{
      clearInterval(TT);
      el.innerHTML=x(text);
      S.typed=true;renderInput();if(cb)cb();
    }
  },spd);
}

/* ═══ RENDER ══════════════════════════════════════ */
function render(){
  refreshProg();
  const app=document.getElementById('app');
  if(S.done){app.innerHTML=buildSum();return;}
  const q=QS[S.step];

  let hist='';
  S.ans.forEach((a,i)=>{
    hist+=`<div class="h-row"><div class="h-n">Q${i+1}</div><div class="h-a">${x(a)}</div></div>`;
  });

  const ordinals=['一','二','三','四','五','六','七','八','九','十'];
  app.innerHTML=`
    <div class="history">${hist}</div>
    <div class="q-block" id="qb">
      <div class="q-header">
        <div class="q-phase-tag">${q.ph}</div>
        <div class="q-ordinal">第${ordinals[q.id-1]}題</div>
      </div>
      <div class="q-text" id="qt"></div>
      ${q.hint?`<div class="q-hint" id="qhint" style="display:none">↗&ensp;${x(q.hint)}</div>`:''}
      <div id="iz" style="display:none"></div>
      <div class="aff-line" id="afl" style="display:none">
        <div class="aff-mark">"</div>
        <div class="aff-txt" id="aft"></div>
      </div>
    </div>`;

  type(q.t,document.getElementById('qt'),()=>{
    if(q.hint)document.getElementById('qhint').style.display='block';
    renderInput();
    setTimeout(()=>window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}),80);
  });
}

function renderInput(){
  if(!S.typed)return;
  const q=QS[S.step],iz=document.getElementById('iz');
  if(!iz)return;
  iz.style.display='block';

  if(q.isC){
    iz.innerHTML=`
      <div class="choices">
        ${q.cs.map(c=>`
          <div class="choice-item${S.sel===c.k?' sel':''}" onclick="pick('${c.k}')">
            <div class="choice-key">${c.k}</div>
            <div class="choice-txt">${x(c.d)}</div>
            <div class="choice-check"></div>
          </div>`).join('')}
      </div>
      <div class="submit-row">
        <button class="btn-next" id="sb" onclick="go()" ${!S.sel?'disabled':''}>
          <span>${q.last?'完成':'繼續'}</span></button>
      </div>`;
  }else{
    iz.innerHTML=`
      <div class="field" id="fld">
        <textarea id="ta" placeholder="在這裡輸入你的回答…"
          rows="4"
          onkeydown="onK(event)"
          oninput="onI()"
          onfocus="document.getElementById('fld').classList.add('focused')"
          onblur="document.getElementById('fld').classList.remove('focused')"></textarea>
        <div class="char-count" id="cc"></div>
      </div>
      <div class="submit-row">
        <button class="btn-next" id="sb" onclick="go()">
          <span>${q.last?'完成':'繼續'}</span></button>
        <span class="kb-hint">⌘ ↵ 送出</span>
      </div>`;
    setTimeout(()=>{const t=document.getElementById('ta');if(t)t.focus();},60);
  }
}

/* ═══ INTERACTIONS ════════════════════════════════ */
function pick(k){S.sel=k;renderInput();}
function onK(e){if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();go();}}
function onI(){
  const t=document.getElementById('ta'),c=document.getElementById('cc');
  if(!t||!c)return;
  const n=t.value.length;
  c.textContent=n?n+' 字':'';
  c.className='char-count'+(n?' has':'');
}

function go(){
  if(S.busy)return;
  const q=QS[S.step];let val='';
  if(q.isC){if(!S.sel)return;const c=q.cs.find(x=>x.k===S.sel);val=c.k+'）'+c.d;}
  else{const t=document.getElementById('ta');val=t?t.value.trim():'';if(!val)return;}

  S.busy=true;
  const af=q.af[Math.floor(Math.random()*q.af.length)];
  const al=document.getElementById('afl'),at=document.getElementById('aft');
  if(al&&at){at.textContent=af;al.style.display='flex';}
  const sb=document.getElementById('sb');if(sb)sb.disabled=true;
  S.ans.push(val);

  setTimeout(()=>{
    S.busy=false;S.typed=false;S.sel=null;
    S.step+1>=QS.length?S.done=true:S.step++;
    render();
    window.scrollTo({top:0,behavior:'smooth'});
  },1700);
}

/* ═══ SUMMARY ══════════════════════════════════════ */
function buildSum(){
  const a=S.ans;
  const rows=[
    {l:'核心主題',v:a[0]||'—'},
    {l:'承諾的結果',v:a[8]||'—'},
    {l:'產品形式',v:a[7]||'—'},
    {l:'第一批潛在客戶',v:a[9]||'—'},
    {l:'定價建議',v:'低價測試版 NT$1,500–3,000 ／ 一對一諮詢 NT$5,000–12,000'},
  ];
  return`<div class="summary">
    <div class="sum-top">
      <div class="sum-eyebrow">✦ 你的第一個產品草稿</div>
      <div class="sum-title">準備好了。<br><em>現在開始賣。</em></div>
    </div>
    <div class="sum-items">
      ${rows.map(r=>`<div class="sum-row">
        <div class="sum-lbl">${r.l}</div>
        <div class="sum-val">${x(r.v)}</div>
      </div>`).join('')}
    </div>
    <div class="cta-block">
      <div class="cta-step">▶ 你的第一步（現在就做）</div>
      <div class="cta-body">傳訊息給你剛才提到的那個人，問他：</div>
      <div class="cta-quote">「我最近在整理一個方法，你有沒有在面對這個問題？我想聊聊看能不能幫到你。」</div>
    </div>
    <div class="sum-actions">
      <button class="btn-pdf" onclick="window.print()">匯出為 PDF</button>
      <button class="btn-restart" onclick="restart()">↺ 重新開始</button>
    </div>
  </div>`;
}

function restart(){
  S={step:0,ans:[],typed:false,busy:false,sel:null,done:false};
  document.getElementById('prog').style.display='';
  document.getElementById('hero').style.display='';
  render();window.scrollTo({top:0,behavior:'smooth'});
}

/* ═══ UTILS ════════════════════════════════════════ */
function x(s){
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

render();
</script>
</body>
</html>
